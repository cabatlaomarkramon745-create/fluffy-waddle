<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student System</title>
  <link rel="stylesheet" href="css/stylehome.css">
</head>
<body>

  <div class="navbar">
    <span class="menu-icon" onclick="openMenu()">☰</span>

    <div class="search-wrapper">
      <input type="text" class="search-bar" placeholder="Search students...">
    </div>

    <div class="profile-area">
      <div class="profile-icon" onclick="toggleProfile(event)">
        <img src="images/profile-icon.png" 
             alt="Profile" 
             onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
      </div>

      <div class="profile-dropdown" id="profileDropdown">                        
        <a href="login.html" id="loginBtn">Login</a>
        <a href="register.html" id="registerBtn">Register</a>
        <a href="#" id="logoutBtn" style="display:none;">Logout</a>
      </div>
    </div>
  </div>

  <div class="side-menu" id="sideMenu">
    <span class="close-btn" onclick="closeMenu()">✖</span>
    <a href="home.html">🏠 Home</a>
    <a href="students.html">📄 Students</a>
    <a href="grading.html">🧮 Grading</a>
  </div>
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  <div class="main-content">
    <h1 style="text-align: center;">Welcome, <span id="userNameDisplay">Guest</span></h1>

    <div class="stats">
      <div class="stat-box">👨‍🎓
        Students Graded<br>
        <strong id="studentCount">0</strong>
      </div>      
    </div>

    <h2 class="start-text" style="text-align: center;">Let’s get started</h2>

    <div class="cards">
      <div class="card" onclick="location.href='grading.html'">
        🧮 Grading
      </div>
      <div class="card" onclick="location.href='students.html'">
        📄 View Students
      </div>
    </div>
  </div>

  <script type="module" src="Js/home.js"></script>
</body>
</html>
